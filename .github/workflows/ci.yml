name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Type Check · Lint · Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # ── Type Check ────────────────────────────────────────────────────────────
      - name: TypeScript type check
        run: npx tsc --noEmit -p tsconfig.app.json

      # ── Lint ─────────────────────────────────────────────────────────────────
      - name: ESLint
        run: npm run lint

      # ── Build ─────────────────────────────────────────────────────────────────
      - name: Vite build
        run: npm run build
        env:
          # CI build uses placeholder values — real secrets live in deployment env
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: placeholder_anon_key
          VITE_SUPABASE_PROJECT_ID: placeholder

      # ── Build artifact size report (informational) ───────────────────────────
      - name: Report bundle size
        if: success()
        run: |
          echo "### Build output" >> $GITHUB_STEP_SUMMARY
          du -sh dist/ >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**JS chunks:**" >> $GITHUB_STEP_SUMMARY
          find dist/assets -name "*.js" | sort | xargs ls -lh | awk '{print $5, $9}' >> $GITHUB_STEP_SUMMARY
